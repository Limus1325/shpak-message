<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shpak Message</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Боковая панель -->
    <div class="sidebar" id="sidebar" style="display:none;">
      <div class="sidebar-header">
        <div class="menu-btn">☰</div>
        <div class="search-box">
          <input type="text" placeholder="Поиск" id="search-input">
        </div>
      </div>
      
      <div class="chat-list" id="chat-list">
        <div class="chat-item active">
          <div class="chat-avatar">📄</div>
          <div class="chat-info">
            <div class="chat-top">
              <div class="chat-name">Общий чат</div>
              <div class="chat-time" id="last-msg-time"></div>
            </div>
            <div class="chat-bottom">
              <div class="chat-last-message" id="last-msg-text">Нажмите, чтобы отправить сообщение</div>
              <div class="chat-unread" id="unread-count" style="display:none;">0</div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="sidebar-footer">
        <div class="user-info" id="sidebar-user-info"></div>
        <button id="btn-logout" class="logout-btn">🚪 Выйти</button>
      </div>
    </div>

    <!-- Область чата -->
    <div class="chat-area" id="chat-area" style="display:none;">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-header-avatar">📄</div>
          <div class="chat-header-info">
            <div class="chat-header-name">Общий чат</div>
            <div class="chat-header-status" id="header-status">онлайн</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="header-btn">🔍</button>
          <button class="header-btn">⋮</button>
        </div>
      </div>
      
      <div class="messages-container" id="messages"></div>
      
      <div class="message-input-area">
        <button class="attach-btn">📎</button>
        <input id="msg-input" placeholder="Написать сообщение..." type="text">
        <button class="emoji-btn">😊</button>
        <button id="btn-send" class="send-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="auth-screen">
      <div class="auth-box">
        <div class="auth-logo">✈️</div>
        <h1>shpak Message</h1>
        <p class="auth-subtitle">Быстрый и безопасный мессенджер</p>
        <input id="login" placeholder="Логин" type="text">
        <input id="pass" placeholder="Пароль" type="password">
        <button id="btn-enter" class="btn-primary">Продолжить</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
