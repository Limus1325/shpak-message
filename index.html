<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shpak Message</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Боковая панель -->
    <div class="sidebar" id="sidebar" style="display:none;">
      <div class="sidebar-header">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="search-box">
          <input type="text" placeholder="Поиск" id="search-input">
        </div>
      </div>
      
     <div class="chat-list-header">
    <h3>Чаты</h3>
    <button class="new-chat-btn" onclick="showNewChatModal()">✏️ Новый чат</button>
</div>
<div class="chat-list" id="chat-list">
    <!-- Сюда JS будет добавлять чаты -->
</div>

<!-- Модальное окно создания чата -->
<div id="new-chat-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content paper-sheet">
        <h3>Создать новый чат</h3>
        <input type="text" id="new-chat-name" placeholder="Название чата (например: Проект X)">
        <p style="font-size:12px; color:#666; margin:10px 0;">Выберите участников:</p>
        <div id="user-select-list" style="max-height:150px; overflow-y:auto; border:1px dashed #ccc; padding:5px;">
            <!-- Список пользователей -->
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeNewChatModal()">Отмена</button>
            <button class="btn-primary" onclick="createNewChat()">Создать</button>
        </div>
    </div>
</div>
      
      <div class="sidebar-footer">
        <div class="user-info" id="sidebar-user-info"></div>
        <button id="btn-logout" class="logout-btn">🚪 Выйти</button>
      </div>
    </div>

    <!-- Область чата -->
    <div class="chat-area" id="chat-area" style="display:none;">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-header-avatar">📄</div>
          <div class="chat-header-info">
            <div class="chat-header-name">Общий чат</div>
            <div class="chat-header-status">онлайн</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="header-btn" onclick="showSearch()">🔍</button>
          <button class="header-btn" onclick="showMenu()">⋮</button>
        </div>
      </div>
      
      <div class="messages-container" id="messages"></div>
      
      <div class="message-input-area">
        <button class="attach-btn" onclick="attachFile()" title="Прикрепить фото">📎</button>
        <input id="msg-input" placeholder="Написать сообщение..." type="text">
        <button class="emoji-btn" onclick="toggleEmojiPicker()" title="Эмодзи">😊</button>
        <button id="btn-send" class="send-btn" onclick="sendMessage()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="auth-screen">
      <div class="auth-box">
        <div class="auth-logo">✈️</div>
        <h1>shpak Message</h1>
        <p class="auth-subtitle">Быстрый и безопасный мессенджер</p>
        <input id="login" placeholder="Логин" type="text">
        <input id="pass" placeholder="Пароль" type="password">
        <button id="btn-enter" class="btn-primary" onclick="login()">Продолжить</button>
      </div>
    </div>

    <!-- Окно выбора эмодзи -->
    <div id="emoji-picker" class="emoji-picker" style="display:none;">
      <div class="emoji-grid">
        <span onclick="insertEmoji('😀')">😀</span>
        <span onclick="insertEmoji('😂')">😂</span>
        <span onclick="insertEmoji('😍')"></span>
        <span onclick="insertEmoji('')">👍</span>
        <span onclick="insertEmoji('')">👏</span>
        <span onclick="insertEmoji('🔥')"></span>
        <span onclick="insertEmoji('❤️')">❤️</span>
        <span onclick="insertEmoji('😢')">😢</span>
        <span onclick="insertEmoji('😮')">😮</span>
        <span onclick="insertEmoji('')">🎉</span>
        <span onclick="insertEmoji('')">✈️</span>
        <span onclick="insertEmoji('')">📄</span>
      </div>
    </div>

    <!-- Скрытый input для файлов -->
    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>
  <!-- Модальное окно для просмотра фото -->
<div id="photo-modal" class="photo-modal" style="display:none;" onclick="closePhotoModal(event)">
  <div class="photo-modal-content" onclick="event.stopPropagation()">
    <button class="close-modal" onclick="closePhotoModal()">✕</button>
    <img id="modal-image" src="" alt="Full size photo">
    <div class="photo-modal-info" id="modal-info"></div>
  </div>
</div>

<!-- Меню (три точки) -->
<div id="menu-dropdown" class="menu-dropdown" style="display:none;">
  <div class="menu-item" onclick="showProfile()">👤 Профиль</div>
  <div class="menu-item" onclick="clearChat()">🗑️ Очистить чат</div>
  <div class="menu-item" onclick="toggleTheme()">🎨 Тема</div>
  <div class="menu-item" onclick="showAbout()">ℹ️ О приложении</div>
</div>

<!-- Боковое меню (три полоски) -->
<div id="sidebar-menu" class="sidebar-menu" style="display:none;">
  <div class="sidebar-menu-header">
    <h3>📄 shpak Message</h3>
    <button onclick="toggleSidebarMenu()">✕</button>
  </div>
  <div class="sidebar-menu-items">
    <div class="menu-item" onclick="showProfile()">👤 Мой профиль</div>
    <div class="menu-item" onclick="showSettings()">⚙️ Настройки</div>
    <div class="menu-item" onclick="showContacts()">📞 Контакты</div>
    <div class="menu-item" onclick="toggleTheme()">🎨 Сменить тему</div>
    <div class="menu-item" onclick="showAbout()">ℹ️ О приложении</div>
  </div>
</div>

<!-- Окно поиска -->
<div id="search-overlay" class="search-overlay" style="display:none;">
  <div class="search-box-container">
    <input type="text" id="search-messages" placeholder="Поиск по сообщениям..." oninput="searchMessages(this.value)">
    <button onclick="closeSearch()">✕</button>
  </div>
  <div id="search-results" class="search-results"></div>
</div>
</body>
</html>
