<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shpak Message</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" id="app-container">
    <!-- Сайдбар -->
    <div class="sidebar" id="sidebar" style="display:none;">
      <div class="sidebar-header">
        <button class="menu-btn" onclick="toggleProfileMenu()">☰</button>
        <div class="search-box"><input type="text" placeholder="Поиск..." onclick="openSearch()"></div>
      </div>
      <div class="chat-list-header">
        <h3>Чаты</h3>
        <button class="new-chat-btn" onclick="openNewChatModal()">+ Чат</button>
      </div>
      <div class="chat-list" id="chat-list"></div>
      <div class="sidebar-footer">
        <div class="user-info" id="sidebar-user-info"></div>
        <button id="btn-logout" class="logout-btn">🚪 Выйти</button>
      </div>
    </div>

    <!-- Область чата -->
    <div class="chat-area" id="chat-area" style="display:none;">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="back-btn" onclick="showChatList()">⬅️</button>
          <div class="chat-header-avatar">📄</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-header-name">Загрузка...</div>
            <div class="chat-header-status">secure connection</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="header-btn" onclick="startCall()">📞</button>
          <button class="header-btn" onclick="openSearch()">🔍</button>
          <button class="header-btn" onclick="toggleChatMenu()">⋮</button>
        </div>
      </div>
      <div class="messages-container" id="messages"></div>
      <div class="message-input-area">
        <button class="attach-btn" onclick="triggerFile()">📎</button>
        <input id="msg-input" placeholder="Написать сообщение..." type="text" maxlength="200">
        <span id="char-counter" style="font-size:12px; color:#888;">0/200</span>
        <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
        <button id="btn-send" class="send-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Экран входа -->
    <div id="auth-screen" class="auth-screen">
      <div class="auth-box paper-sheet" id="auth-box">
        <div class="auth-logo">✈️</div>
        <h1>shpak Message</h1>
        <p class="auth-subtitle">Encrypted Paper Protocol</p>
        <input id="login" placeholder="Логин">
        <input id="pass" placeholder="Пароль" type="password">
        <button id="btn-enter" class="btn-primary">Войти</button>
      </div>
    </div>

    <!-- ТЕРМИНАЛ ROOT -->
    <div id="terminal-overlay" style="display:none;">
      <div id="terminal-bg"></div>
      <div id="terminal">
        <div id="terminal-output"></div>
        <div class="terminal-input-line">
          <span id="terminal-prompt">root@killer:/home/Limus# </span>
          <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
        </div>
      </div>
    </div>
  </div>

  <!-- Меню профиля -->
  <div id="profile-menu" class="dropdown-menu" style="display:none;">
    <div class="menu-item" onclick="showProfile()">👤 Мой профиль</div>
    <div class="menu-item" onclick="logout()">🚪 Выйти</div>
  </div>
  <!-- Меню чата -->
  <div id="chat-menu" class="dropdown-menu" style="display:none;">
    <div class="menu-item" onclick="blockCurrentUser()">🚫 Заблокировать</div>
    <div class="menu-item" onclick="deleteCurrentChat()" style="color:red;">🗑️ Удалить чат</div>
  </div>

  <!-- Интерфейс звонка -->
  <div id="call-overlay" class="call-overlay" style="display:none;">
    <div class="call-box">
      <div class="call-avatar">📞</div>
      <h2 id="call-status">Вызов...</h2>
      <p id="call-timer">00:00</p>
      <div class="call-controls">
        <button class="call-btn mute-btn" onclick="toggleMute()">🎤</button>
        <button class="call-btn end-btn" onclick="endCall()">📵</button>
      </div>
      <audio id="remote-audio" autoplay></audio>
    </div>
  </div>

  <!-- Уведомление о звонке -->
  <div id="incoming-call-toast" class="call-toast" style="display:none;">
    <div class="toast-content">
      <div class="toast-avatar">📞</div>
      <div class="toast-info"><h3>Входящий звонок</h3><p id="caller-name">Неизвестный</p></div>
      <div class="toast-actions">
        <button class="toast-btn accept" onclick="acceptIncomingCall()">✅ Принять</button>
        <button class="toast-btn reject" onclick="rejectIncomingCall()">❌ Отклонить</button>
      </div>
    </div>
  </div>

  <!-- Остальные модалки -->
  <div id="photo-modal" class="photo-modal" style="display:none;" onclick="closePhotoModal(event)">
    <div class="photo-modal-content" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closePhotoModal()">✕</button>
      <img id="modal-img" src="" alt="Photo">
    </div>
  </div>
  <div id="search-overlay" class="search-overlay" style="display:none;">
    <div class="search-box-container">
      <input type="text" id="search-input" placeholder="Поиск..." oninput="handleSearch(this.value)">
      <button onclick="closeSearch()">✕</button>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
  <div id="emoji-picker" class="emoji-picker" style="display:none;">
    <div class="emoji-grid">
      <span onclick="insertEmoji('😀')">😀</span><span onclick="insertEmoji('😂')">😂</span>
      <span onclick="insertEmoji('😍')">😍</span><span onclick="insertEmoji('🔥')">🔥</span>
      <span onclick="insertEmoji('✈️')">✈️</span><span onclick="insertEmoji('👑')">👑</span>
      <span onclick="insertEmoji('👻')">👻</span><span onclick="insertEmoji('😼')">😼</span>
    </div>
  </div>
  <div id="new-chat-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content paper-sheet">
      <h3>Новый чат</h3>
      <input type="text" id="new-chat-name" placeholder="Название">
      <div id="user-list" style="max-height:100px; overflow:auto; border:1px dashed #999; margin:5px 0;"></div>
      <div style="display:flex; gap:5px; margin-top:10px;">
        <button class="btn-secondary" onclick="closeNewChatModal()">Отмена</button>
        <button class="btn-primary" onclick="createChat()">Создать</button>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(event)">
  
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
